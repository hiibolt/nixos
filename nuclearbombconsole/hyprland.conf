# Monitor — auto-detect
monitor = ,preferred,auto,1

# Autostart
exec-once = waybar
exec-once = mako
exec-once = hyprpaper
exec-once = nm-applet --indicator

# Environment
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORMTHEME,qt5ct

# Input
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        clickfinger_behavior = true
        drag_lock = true
        disable_while_typing = true
    }
}

# Touchpad gestures
gestures {
    gesture = 3, horizontal, workspace
}


# Appearance
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
    }

    active_opacity = 0.95
    inactive_opacity = 0.88
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(1a1a2eee)
    }
}

animations {
    enabled = true
    bezier = snappy, 0.05, 0.9, 0.1, 1.05
    animation = windows, 0
    animation = windowsOut, 0
    animation = fade, 1, 4, snappy
    animation = workspaces, 0
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# Key binds
$mod = SUPER

bind = $mod, T, exec, kitty
bind = $mod, space, exec, wofi --show drun
bind = $mod, Q, killactive,
bind = $mod, M, exit,
bind = $mod, E, exec, nemo
bind = $mod, F, fullscreen,
bind = $mod SHIFT, V, togglefloating,
bind = $mod, P, pseudo,
bind = $mod, S, togglesplit,
bind = $mod, L, exec, librewolf
bind = $mod, V, exec, vesktop
bind = $mod SHIFT, L, exec, hyprlock

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod, Print, exec, grim - | wl-copy

# Volume / brightness
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Move to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Window rules
windowrulev2 = opacity 1.0 override, class:^(librewolf)$
windowrulev2 = opacity 1.0 override, class:^(com.obsproject.Studio)$
